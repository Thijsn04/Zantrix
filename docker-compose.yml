version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zantrix-postgres
    environment:
      POSTGRES_USER: zantrix
      POSTGRES_PASSWORD: zantrix_password
      POSTGRES_DB: zantrix_db
    ports:
      - "5433:5432"
    volumes:
      - zantrix_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: zantrix-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/zantrix_db
      KC_DB_USERNAME: zantrix
      KC_DB_PASSWORD: zantrix_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  zantrix_pgdata:
